name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing git tag to publish (e.g. v0.1.0-alpha.2). Must already exist as a tag on the repo."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Cap each matrix entry so a runner that never gets allocated (e.g. a
    # scarce macos-13 runner) cannot block the workflow indefinitely. With
    # the partial-success publish gate added in #176, a timed-out entry
    # no longer prevents publication of the surviving targets.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p penny-cli --target "${{ matrix.target }}" --locked

      - name: Package release artifact and checksum
        shell: bash
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          ASSET="penny-cli-${VERSION}-${TARGET}"
          mkdir -p dist
          cp "target/${TARGET}/release/penny-cli" "dist/penny-cli"
          tar -C dist -czf "dist/${ASSET}.tar.gz" penny-cli
          (
            cd dist
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "${ASSET}.tar.gz" > "${ASSET}.sha256"
            else
              sha256sum "${ASSET}.tar.gz" > "${ASSET}.sha256"
            fi
          )
          rm -f dist/penny-cli

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 15
    # Run publish whenever the build matrix has terminated, even if one or
    # more individual matrix entries failed or were cancelled (e.g. a stuck
    # macos-13 runner). Workflow-level cancellation by a user still skips
    # publish. The artifact-count guard below prevents empty publishes.
    if: ${{ !cancelled() }}
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Require minimum artifact count
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_COUNT=$(find dist -maxdepth 1 -name "*.tar.gz" | wc -l | tr -d ' ')
          MIN_ARTIFACTS=3
          if [ "${ARTIFACT_COUNT}" -lt "${MIN_ARTIFACTS}" ]; then
            echo "::error::Refusing to publish: only ${ARTIFACT_COUNT} artifact(s) present, require at least ${MIN_ARTIFACTS}."
            exit 1
          fi
          echo "Publishing release with ${ARTIFACT_COUNT} artifact(s):"
          (cd dist && ls -1 *.tar.gz)

      - name: Build aggregated checksum file
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > CHECKSUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/CHECKSUMS.txt
