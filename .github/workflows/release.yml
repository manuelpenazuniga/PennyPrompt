name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p penny-cli --target "${{ matrix.target }}" --locked

      - name: Package release artifact and checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ASSET="penny-cli-${VERSION}-${TARGET}"
          mkdir -p dist
          cp "target/${TARGET}/release/penny-cli" "dist/penny-cli"
          tar -C dist -czf "dist/${ASSET}.tar.gz" penny-cli
          (
            cd dist
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "${ASSET}.tar.gz" > "${ASSET}.sha256"
            else
              sha256sum "${ASSET}.tar.gz" > "${ASSET}.sha256"
            fi
          )
          rm -f dist/penny-cli

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Build aggregated checksum file
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > CHECKSUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/CHECKSUMS.txt
